body:
  text: 金剛般若經序胡吉藏法師撰金剛般若波羅蜜經者斯乃是三觀之虛明一實之淵致昔仙人苑內未耀此摩尼今長者園中方灑茲甘露良由小志先開故早馳羊鹿大心始發方駕此白牛斯乃正教之供範薩埵明訓非雲非雨德潤四生非日非月照明三界統萬行若滄海之納衆流蕩紛異若冬霜之凋百草若具存梵本應云跋闍羅般若波羅蜜修多羅此土翻譯金剛智慧彼岸到經明無纍不摧稱曰金剛無境不照目為般若永勉彼此名波羅蜜經者訓法常也
